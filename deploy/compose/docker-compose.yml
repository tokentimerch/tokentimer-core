# TokenTimer Self-Host Docker Compose
# Usage: docker compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: tokentimer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tokentimer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-tokentimer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-tokentimer} -d ${DB_NAME:-tokentimer}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database Migrations (run once)
  migrations:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.api
    container_name: tokentimer-migrations
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "apps/api/migrations/migrate.js"]
    restart: "no"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}

  # API Service
  api:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.api
    container_name: tokentimer-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-production}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}

      # URLs
      APP_URL: ${APP_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:4000}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}

      # CertOps rollout flag (env > DB > default). Enabled by default; set to
      # false to disable the CertOps layer. Must match the endpoint-check
      # worker below so the monitor bridge gate resolves consistently.
      CERTOPS_ENABLED: ${CERTOPS_ENABLED:-true}

      # Auth
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}
      SESSION_COOKIE_SECURE_LOCALHOST_OVERRIDE: ${SESSION_COOKIE_SECURE_LOCALHOST_OVERRIDE:-false}

      # Reverse proxy: number of trusted proxy hops in front of the API.
      # Affects req.ip and req.protocol resolution. Default 2 covers
      # LB -> reverse-proxy. Set 0 when no proxy is in front.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-2}

      # Admin Bootstrap (set DISABLE_ADMIN_BOOTSTRAP=true to skip)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      DISABLE_ADMIN_BOOTSTRAP: ${DISABLE_ADMIN_BOOTSTRAP:-}

      # Worker <-> API shared secret (falls back to SESSION_SECRET if unset)
      WORKER_API_KEY: ${WORKER_API_KEY:-}

      # Alerting / delivery tuning (workspace DB > env vars here > code defaults)
      ALERT_THRESHOLDS: ${ALERT_THRESHOLDS:-}
      ALERT_MAX_ATTEMPTS: ${ALERT_MAX_ATTEMPTS:-}
      ALERT_RETRY_DELAY_MS: ${ALERT_RETRY_DELAY_MS:-}

      # Webhook security
      WEBHOOK_PROVIDER_HOSTS: ${WEBHOOK_PROVIDER_HOSTS:-}
      WEBHOOK_EXTRA_PROVIDER_HOSTS: ${WEBHOOK_EXTRA_PROVIDER_HOSTS:-}
      WEBHOOK_ALLOW_ALL_HOSTS: ${WEBHOOK_ALLOW_ALL_HOSTS:-false}
      WEBHOOK_ALLOW_PRIVATE_IPS: ${WEBHOOK_ALLOW_PRIVATE_IPS:-false}

      # Metrics (Prometheus)
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}

      # SMTP (optional - configure here or via System Settings UI)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_EMAIL_NAME: ${FROM_EMAIL_NAME:-}

      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_TEST_CONTENT_SID: ${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID: ${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}

    volumes: []
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  # Worker Service - Alert Discovery
  worker-discovery:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.worker
    container_name: tokentimer-worker-discovery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "/app/apps/worker/src/runner.js", "discovery"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}

      # URLs
      APP_URL: ${APP_URL:-http://localhost:5173}

      # Session secret (needed for decrypting DB-stored secrets)
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}
      WORKER_API_KEY: ${WORKER_API_KEY:-}

      # Metrics (Prometheus pushgateway)
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}
      WORKER_DISCOVERY_CRON: "${WORKER_DISCOVERY_CRON:-*/5 * * * *}"
      WORKER_DISCOVERY_INTERVAL_MS: ${WORKER_DISCOVERY_INTERVAL_MS:-}
      WORKER_RUN_ON_START: ${WORKER_RUN_ON_START:-false}
      WORKER_EXIT_ON_ERROR: ${WORKER_EXIT_ON_ERROR:-false}

      # SMTP (optional - configure here or via System Settings UI)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_EMAIL_NAME: ${FROM_EMAIL_NAME:-}

      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_TEST_CONTENT_SID: ${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID: ${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}

    volumes: []

  # Worker Service - Alert Delivery
  worker-delivery:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.worker
    container_name: tokentimer-worker-delivery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "/app/apps/worker/src/runner.js", "delivery"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}

      # URLs
      APP_URL: ${APP_URL:-http://localhost:5173}

      # Session secret (needed for decrypting DB-stored secrets)
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}
      WORKER_API_KEY: ${WORKER_API_KEY:-}

      # Delivery tuning
      ALERT_THRESHOLDS: ${ALERT_THRESHOLDS:-}
      ALERT_MAX_ATTEMPTS: ${ALERT_MAX_ATTEMPTS:-}
      ALERT_RETRY_DELAY_MS: ${ALERT_RETRY_DELAY_MS:-}
      DELIVERY_WINDOW_DEFAULT_START: ${DELIVERY_WINDOW_DEFAULT_START:-}
      DELIVERY_WINDOW_DEFAULT_END: ${DELIVERY_WINDOW_DEFAULT_END:-}
      DELIVERY_WINDOW_DEFAULT_TZ: ${DELIVERY_WINDOW_DEFAULT_TZ:-}
      DELIVERY_WINDOW_DEFERRAL_MS: ${DELIVERY_WINDOW_DEFERRAL_MS:-}

      # Webhook security
      WEBHOOK_PROVIDER_HOSTS: ${WEBHOOK_PROVIDER_HOSTS:-}
      WEBHOOK_EXTRA_PROVIDER_HOSTS: ${WEBHOOK_EXTRA_PROVIDER_HOSTS:-}
      WEBHOOK_ALLOW_ALL_HOSTS: ${WEBHOOK_ALLOW_ALL_HOSTS:-false}
      WEBHOOK_ALLOW_PRIVATE_IPS: ${WEBHOOK_ALLOW_PRIVATE_IPS:-false}

      # Metrics (Prometheus pushgateway)
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}
      WORKER_DELIVERY_CRON: "${WORKER_DELIVERY_CRON:-1/5 * * * *}"
      WORKER_DELIVERY_INTERVAL_MS: ${WORKER_DELIVERY_INTERVAL_MS:-}
      WORKER_RUN_ON_START: ${WORKER_RUN_ON_START:-false}
      WORKER_EXIT_ON_ERROR: ${WORKER_EXIT_ON_ERROR:-false}

      # SMTP (optional - configure here or via System Settings UI)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_EMAIL_NAME: ${FROM_EMAIL_NAME:-}

      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_TEST_CONTENT_SID: ${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID: ${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}

    volumes: []

  # Worker Service - Weekly Digest
  worker-weekly-digest:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.worker
    container_name: tokentimer-worker-weekly-digest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "/app/apps/worker/src/runner.js", "weekly-digest"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}

      # URLs
      APP_URL: ${APP_URL:-http://localhost:5173}

      # Session secret (needed for decrypting DB-stored secrets)
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}
      WORKER_API_KEY: ${WORKER_API_KEY:-}

      # Delivery window (digest also respects it)
      DELIVERY_WINDOW_DEFAULT_START: ${DELIVERY_WINDOW_DEFAULT_START:-}
      DELIVERY_WINDOW_DEFAULT_END: ${DELIVERY_WINDOW_DEFAULT_END:-}
      DELIVERY_WINDOW_DEFAULT_TZ: ${DELIVERY_WINDOW_DEFAULT_TZ:-}

      # Webhook security
      WEBHOOK_PROVIDER_HOSTS: ${WEBHOOK_PROVIDER_HOSTS:-}
      WEBHOOK_EXTRA_PROVIDER_HOSTS: ${WEBHOOK_EXTRA_PROVIDER_HOSTS:-}
      WEBHOOK_ALLOW_ALL_HOSTS: ${WEBHOOK_ALLOW_ALL_HOSTS:-false}
      WEBHOOK_ALLOW_PRIVATE_IPS: ${WEBHOOK_ALLOW_PRIVATE_IPS:-false}

      # Metrics (Prometheus pushgateway)
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}
      WORKER_WEEKLY_DIGEST_CRON: "${WORKER_WEEKLY_DIGEST_CRON:-0 9 * * 1}"
      WORKER_WEEKLY_DIGEST_INTERVAL_MS: ${WORKER_WEEKLY_DIGEST_INTERVAL_MS:-}
      WORKER_WEEKLY_DIGEST_RUN_ON_START: ${WORKER_WEEKLY_DIGEST_RUN_ON_START:-false}
      WORKER_EXIT_ON_ERROR: ${WORKER_EXIT_ON_ERROR:-false}

      # SMTP (optional - configure here or via System Settings UI)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      FROM_EMAIL_NAME: ${FROM_EMAIL_NAME:-}

      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_TEST_CONTENT_SID: ${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED: ${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID: ${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}

    volumes: []

  # Worker Service - Auto Sync
  worker-auto-sync:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.worker
    container_name: tokentimer-worker-auto-sync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "/app/apps/worker/src/runner.js", "auto-sync"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      API_URL: http://api:4000
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}
      WORKER_AUTO_SYNC_CRON: "${WORKER_AUTO_SYNC_CRON:-*/1 * * * *}"
      WORKER_AUTO_SYNC_INTERVAL_MS: ${WORKER_AUTO_SYNC_INTERVAL_MS:-}
      WORKER_AUTO_SYNC_RUN_ON_START: ${WORKER_AUTO_SYNC_RUN_ON_START:-true}
      WORKER_RUN_ON_START: ${WORKER_RUN_ON_START:-false}
      WORKER_EXIT_ON_ERROR: ${WORKER_EXIT_ON_ERROR:-false}
    volumes: []

  # Worker Service - Endpoint (SSL) Check
  worker-endpoint-check:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.worker
    container_name: tokentimer-worker-endpoint-check
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "/app/apps/worker/src/runner.js", "endpoint-check"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-UTC}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokentimer}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-tokentimer}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      PUSHGATEWAY_URL: ${PUSHGATEWAY_URL:-}
      ENVIRONMENT_SUFFIX: ${ENVIRONMENT_SUFFIX:-}
      # CertOps rollout flag (env > DB > default). Enabled by default; must
      # match the api service so the monitor bridge gate resolves consistently.
      CERTOPS_ENABLED: ${CERTOPS_ENABLED:-true}
      WORKER_ENDPOINT_CHECK_CRON: "${WORKER_ENDPOINT_CHECK_CRON:-*/1 * * * *}"
      WORKER_ENDPOINT_CHECK_INTERVAL_MS: ${WORKER_ENDPOINT_CHECK_INTERVAL_MS:-}
      WORKER_RUN_ON_START: ${WORKER_RUN_ON_START:-false}
      WORKER_EXIT_ON_ERROR: ${WORKER_EXIT_ON_ERROR:-false}

  # The customer-cluster controller is opt-in. Compose is a packaging/config
  # validation surface; production Kubernetes installs should use the Helm
  # ServiceAccount, RBAC, and NetworkPolicy resources.
  certops-controller:
    profiles: ["certops-controller"]
    build:
      context: ../../
      dockerfile: apps/k8s-controller/Dockerfile
    image: tokentimer-core-k8s-controller
    container_name: tokentimer-certops-controller
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TOKENTIMER_API_URL: ${CERTOPS_CONTROLLER_API_URL:-}
      TOKENTIMER_WORKSPACE_ID: ${CERTOPS_CONTROLLER_WORKSPACE_ID:-}
      TOKENTIMER_CLUSTER_ID: ${CERTOPS_CONTROLLER_CLUSTER_ID:-}
      TOKENTIMER_API_TOKEN_FILE: /run/secrets/tokentimer-api-token
      CERTOPS_CONTROLLER_MODE: ${CERTOPS_CONTROLLER_MODE:-observe}
      CERTOPS_CLUSTER_WIDE: ${CERTOPS_CLUSTER_WIDE:-false}
      CERTOPS_WATCH_NAMESPACES: ${CERTOPS_WATCH_NAMESPACES:-}
      CERTOPS_SECRET_FALLBACK_ENABLED: ${CERTOPS_SECRET_FALLBACK_ENABLED:-false}
      CERTOPS_RECONCILE_INTERVAL: ${CERTOPS_RECONCILE_INTERVAL:-}
      CERTOPS_HEALTH_PORT: ${CERTOPS_HEALTH_PORT:-8080}
      CERTOPS_SHUTDOWN_TIMEOUT: ${CERTOPS_SHUTDOWN_TIMEOUT:-}
    volumes:
      - ${CERTOPS_CONTROLLER_TOKEN_FILE:-./.tokentimer-controller-token-missing}:/run/secrets/tokentimer-api-token:ro

  # Dashboard (Frontend)
  dashboard:
    build:
      context: ../../
      dockerfile: deploy/compose/Dockerfile.dashboard
      args:
        VITE_API_URL: ${API_URL:-http://localhost:4000}
    container_name: tokentimer-dashboard
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://localhost:4000}
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: tokentimer-network
