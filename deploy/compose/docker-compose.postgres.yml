# Local PostgreSQL for `pnpm run dev` (postgres service only).
# Credentials and port come from the root .env (DB_* variables).

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: tokentimer-pg
    environment:
      POSTGRES_USER: ${DB_USER:-tokentimer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-tokentimer}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-tokentimer} -d ${DB_NAME:-tokentimer}",
        ]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
