# TokenTimer Core - Development Environment
# Usage: docker compose -f docker-compose.dev.yml up

networks:
  tokentimer-network:
    driver: bridge

services:
  postgres:
    image: postgres:17-alpine
    container_name: tokentimer-core-postgres-dev
    environment:
      POSTGRES_DB: tokentimer
      POSTGRES_USER: tokentimer
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tokentimer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokentimer -d tokentimer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile.dev
      cache_from:
        - node:22-slim
    container_name: tokentimer-core-api-dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - OPENAPI_SPEC_PATH=/contracts/openapi/openapi.yaml
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - APP_URL=http://localhost:5173
      - API_URL=http://localhost:4000
      - SESSION_SECRET=dev_session_secret_change_in_production
      - ADMIN_EMAIL=admin@localhost.local
      - ADMIN_PASSWORD=AdminPassword123!
      - ADMIN_NAME=Administrator
      # SMTP (optional - configure here or via System Settings UI)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_REQUIRE_TLS=${SMTP_REQUIRE_TLS:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - FROM_EMAIL_NAME=${FROM_EMAIL_NAME:-}
      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_WHATSAPP_TEST_CONTENT_SID=${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      - TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID=${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}
      # Metrics / diagnostics
      - ENABLE_METRICS=${ENABLE_METRICS:-false}
      - ENVIRONMENT_SUFFIX=${ENVIRONMENT_SUFFIX:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../packages/contracts/openapi:/contracts/openapi:ro
      - /app/node_modules
      - /app/apps/api/node_modules
    working_dir: /app/apps/api
    restart: unless-stopped
    command: sh -c "pnpm run migrate && pnpm start"

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-dashboard-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:4000}
      - VITE_ENVIRONMENT=development
    volumes:
      - ../../apps/dashboard:/app/apps/dashboard
      - /app/node_modules
      - /app/apps/dashboard/node_modules
    working_dir: /app/apps/dashboard
    depends_on:
      - api
    networks:
      - tokentimer-network
    restart: unless-stopped
    command: sh -c "pnpm run dev -- --host 0.0.0.0"

  # Worker - Alert Discovery (queues alerts)
  worker-discovery:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-worker-discovery
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - APP_URL=http://localhost:5173
      - SESSION_SECRET=dev_session_secret_change_in_production
      # SMTP (optional - configure here or via System Settings UI)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - FROM_EMAIL_NAME=${FROM_EMAIL_NAME:-}
      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_WHATSAPP_TEST_CONTENT_SID=${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      - TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID=${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}
      - "WORKER_DISCOVERY_CRON=${WORKER_DISCOVERY_CRON:-*/5 * * * *}"
      - WORKER_DISCOVERY_INTERVAL_MS=${WORKER_DISCOVERY_INTERVAL_MS:-}
      - WORKER_RUN_ON_START=${WORKER_RUN_ON_START:-false}
      - WORKER_EXIT_ON_ERROR=${WORKER_EXIT_ON_ERROR:-false}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/node_modules
      - /app/apps/worker/node_modules
    restart: unless-stopped
    command: ["node", "src/runner.js", "discovery"]

  # Worker - Alert Delivery (sends notifications)
  worker-delivery:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-worker-delivery
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - APP_URL=http://localhost:5173
      - SESSION_SECRET=dev_session_secret_change_in_production
      # SMTP (optional - configure here or via System Settings UI)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - FROM_EMAIL_NAME=${FROM_EMAIL_NAME:-}
      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_WHATSAPP_TEST_CONTENT_SID=${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_DOWN:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_ENDPOINT_RECOVERED:-}
      - TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID=${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}
      - "WORKER_DELIVERY_CRON=${WORKER_DELIVERY_CRON:-1/5 * * * *}"
      - WORKER_DELIVERY_INTERVAL_MS=${WORKER_DELIVERY_INTERVAL_MS:-}
      - WORKER_RUN_ON_START=${WORKER_RUN_ON_START:-false}
      - WORKER_EXIT_ON_ERROR=${WORKER_EXIT_ON_ERROR:-false}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/node_modules
      - /app/apps/worker/node_modules
    restart: unless-stopped
    command: ["node", "src/runner.js", "delivery"]

  # Worker - Weekly Digest (sends weekly summary emails)
  worker-weekly-digest:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-worker-weekly-digest
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - APP_URL=http://localhost:5173
      - SESSION_SECRET=dev_session_secret_change_in_production
      # SMTP (optional - configure here or via System Settings UI)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - FROM_EMAIL_NAME=${FROM_EMAIL_NAME:-}
      # Twilio WhatsApp (optional - configure here or via System Settings UI)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_WHATSAPP_TEST_CONTENT_SID=${TWILIO_WHATSAPP_TEST_CONTENT_SID:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRES:-}
      - TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED=${TWILIO_WHATSAPP_ALERT_CONTENT_SID_EXPIRED:-}
      - TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID=${TWILIO_WHATSAPP_WEEKLY_DIGEST_CONTENT_SID:-}
      - "WORKER_WEEKLY_DIGEST_CRON=${WORKER_WEEKLY_DIGEST_CRON:-0 9 * * 1}"
      - WORKER_WEEKLY_DIGEST_INTERVAL_MS=${WORKER_WEEKLY_DIGEST_INTERVAL_MS:-}
      - WORKER_WEEKLY_DIGEST_RUN_ON_START=${WORKER_WEEKLY_DIGEST_RUN_ON_START:-false}
      - WORKER_EXIT_ON_ERROR=${WORKER_EXIT_ON_ERROR:-false}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/node_modules
      - /app/apps/worker/node_modules
    restart: unless-stopped
    command: ["node", "src/runner.js", "weekly-digest"]

  # Worker - Auto Sync (scheduled integration scans)
  worker-auto-sync:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-worker-auto-sync
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - SESSION_SECRET=dev_session_secret_change_in_production
      - API_URL=http://api:4000
      - "WORKER_AUTO_SYNC_CRON=${WORKER_AUTO_SYNC_CRON:-*/1 * * * *}"
      - WORKER_AUTO_SYNC_INTERVAL_MS=${WORKER_AUTO_SYNC_INTERVAL_MS:-}
      - WORKER_AUTO_SYNC_RUN_ON_START=${WORKER_AUTO_SYNC_RUN_ON_START:-true}
      - WORKER_RUN_ON_START=${WORKER_RUN_ON_START:-false}
      - WORKER_EXIT_ON_ERROR=${WORKER_EXIT_ON_ERROR:-false}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/node_modules
      - /app/apps/worker/node_modules
    restart: unless-stopped
    command: ["node", "src/runner.js", "auto-sync"]

  # Worker - Endpoint (SSL) Check (SSL + health monitoring)
  worker-endpoint-check:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile.dev
      cache_from:
        - node:22-alpine
    container_name: tokentimer-core-worker-endpoint-check
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tokentimer
      - DB_USER=tokentimer
      - DB_PASSWORD=password
      - "WORKER_ENDPOINT_CHECK_CRON=${WORKER_ENDPOINT_CHECK_CRON:-*/1 * * * *}"
      - WORKER_ENDPOINT_CHECK_INTERVAL_MS=${WORKER_ENDPOINT_CHECK_INTERVAL_MS:-}
      - WORKER_RUN_ON_START=${WORKER_RUN_ON_START:-false}
      - WORKER_EXIT_ON_ERROR=${WORKER_EXIT_ON_ERROR:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tokentimer-network
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/node_modules
      - /app/apps/worker/node_modules
    restart: unless-stopped
    command: ["node", "src/runner.js", "endpoint-check"]

volumes:
  postgres_data:
