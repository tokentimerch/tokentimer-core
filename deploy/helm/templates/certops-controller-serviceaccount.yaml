{{- if .Values.certops.controller.enabled }}
{{- include "tokentimer.certopsControllerValidate" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tokentimer.certopsControllerServiceAccountName" . }}
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
    app.kubernetes.io/component: certops-controller
# The controller talks to the Kubernetes API. Keep this opt-in separate from
# the shared application service account, which remains tokenless by default.
automountServiceAccountToken: true
{{- end }}
