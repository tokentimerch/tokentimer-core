{{- if .Values.worker.cronjobs.endpointCheck.enabled }}
{{- $job := .Values.worker.cronjobs.endpointCheck }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "tokentimer.fullname" . }}-endpoint-check
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
    app.kubernetes.io/component: endpoint-check
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: {{ $job.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $job.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $job.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $job.failedJobsHistoryLimit }}
  jobTemplate:
    metadata:
      labels:
        {{- include "tokentimer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: endpoint-check
    spec:
      backoffLimit: {{ $job.backoffLimit }}
      {{- with $job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "tokentimer.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: endpoint-check
            {{- with .Values.worker.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.worker.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          restartPolicy: Never
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "tokentimer.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: endpoint-check
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: {{ include "tokentimer.image" (dict "image" .Values.worker.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
              imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
              command: ["node", "apps/worker/src/endpoint-check-worker.js"]
              envFrom:
                {{- include "tokentimer.envFrom" . | nindent 16 }}
                {{- with .Values.worker.envFrom }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- if .Values.worker.env }}
              env:
                {{- range $key, $value := .Values.worker.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              {{- end }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                {{- with .Values.worker.extraVolumeMounts }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              resources:
                {{- toYaml $job.resources | nindent 16 }}
          volumes:
            - name: tmp
              emptyDir: {}
            {{- with .Values.worker.extraVolumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.worker.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
