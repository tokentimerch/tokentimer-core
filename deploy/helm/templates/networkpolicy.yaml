{{- if .Values.networkPolicy.enabled }}
# ── Default deny ──────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokentimer.fullname" . }}-default-deny
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tokentimer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []

---
# ── API ───────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokentimer.fullname" . }}-api
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "tokentimer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingressNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: 4000
    {{- end }}
    {{- if .Values.networkPolicy.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: 4000
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "tokentimer.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: dashboard
      ports:
        - protocol: TCP
          port: 4000
  egress:
    {{- if .Values.postgresql.cloudnative.enabled }}
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "tokentimer.fullname" . }}-pg
      ports:
        - protocol: TCP
          port: 5432
    {{- else }}
    - ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # SMTP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    # HTTPS (OAuth providers, external integrations)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

---
# ── Dashboard ─────────────────────────────────────────────────────────────────
{{- if .Values.dashboard.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokentimer.fullname" . }}-dashboard
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  podSelector:
    matchLabels:
      {{- include "tokentimer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingressNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    {{- if .Values.networkPolicy.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
  egress:
    # DNS (nginx resolver)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}

---
# ── Workers (all CronJob components) ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokentimer.fullname" . }}-worker
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tokentimer.selectorLabels" . | nindent 6 }}
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - alert-discovery
          - alert-delivery
          - weekly-digest
          - endpoint-check
          - auto-sync
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    {{- if .Values.postgresql.cloudnative.enabled }}
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "tokentimer.fullname" . }}-pg
      ports:
        - protocol: TCP
          port: 5432
    {{- else }}
    - ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # SMTP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    # HTTPS (Slack, Discord, Teams webhooks, Twilio)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    {{- if .Values.monitoring.metrics.pushgatewayUrl }}
    # Pushgateway
    {{- if .Values.networkPolicy.monitoringNamespace }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: 9091
    {{- else }}
    - ports:
        - protocol: TCP
          port: 9091
    {{- end }}
    {{- end }}
{{- end }}
