{{- if not .Values.config.existingSecret }}
{{- $secretName := printf "%s-secrets" (include "tokentimer.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $data := default dict (default dict $existing).data -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tokentimer.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ .Values.config.sessionSecret | default (include "tokentimer.secretLookup" (dict "data" $data "key" "SESSION_SECRET" "fallback" (randAlphaNum 64))) | quote }}

  {{- if and .Values.postgresql.cloudnative.enabled (not .Values.postgresql.auth.existingSecret) }}
  DB_PASSWORD: {{ include "tokentimer.cnpgPassword" . | quote }}
  {{- else if and .Values.postgresql.external.enabled (not .Values.postgresql.external.existingSecret) }}
  DB_PASSWORD: {{ .Values.postgresql.external.password | default (include "tokentimer.secretLookup" (dict "data" $data "key" "DB_PASSWORD" "fallback" (randAlphaNum 32))) | quote }}
  {{- end }}

  {{- if .Values.config.adminEmail }}
  ADMIN_PASSWORD: {{ .Values.config.adminPassword | default (include "tokentimer.secretLookup" (dict "data" $data "key" "ADMIN_PASSWORD" "fallback" (randAlphaNum 24))) | quote }}
  {{- end }}

  {{- if and .Values.smtp.password (not .Values.smtp.existingSecret) }}
  SMTP_PASS: {{ .Values.smtp.password | quote }}
  {{- end }}

  {{- if and .Values.twilio.authToken (not .Values.twilio.existingSecret) }}
  TWILIO_AUTH_TOKEN: {{ .Values.twilio.authToken | quote }}
  {{- end }}
{{- end }}
