events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Prevent Nginx from exposing internal port in redirects
        absolute_redirect off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Handle React Router (SPA routing)
        # Serve runtime env.js from writable cache directory
        location = /env.js {
            alias /var/cache/nginx/env.js;
            add_header Cache-Control "no-store";
        }

        location / {
            # Try to serve pre-rendered static files first, then fall back to SPA
            # Pre-rendered pages will be at /blog/asset-tracking/index.html, etc.
            try_files $uri $uri/index.html /index.html;
        }

        # Cache-busting for hashed assets; keep HTML dynamic
        location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; expires -1; }
        # Static assets caching
        # JS/CSS should be revalidated to avoid stale entry bundles referencing removed chunks
        location ~* \.(js|css)$ {
            expires 5m;
            add_header Cache-Control "public, max-age=300, must-revalidate";
        }

        # Long‑lived caching for images/fonts (content‑hashed and safe to cache)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|avif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API proxy (optional - if you want to proxy API calls)
        # location /api/ {
        #     proxy_pass http://tokentimer-backend:4000/api/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # Disable server version leakage
    server_tokens off;
}