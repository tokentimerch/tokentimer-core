    CertOpsEvidenceMetadata:
      type: object
      additionalProperties: false
      description: Strict standalone normalized/persisted public evidence metadata. M2-A10 separately stores bounded executor output after private-key rejection and generic-secret redaction; raw output and key-bearing artifacts are excluded here.
      required:
        - schemaVersion
        - evidenceId
        - jobId
        - workspaceId
        - eventType
        - source
        - observedAt
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        evidenceId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
        jobId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
        workspaceId:
          type: string
          format: uuid
        certificateId:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          nullable: true
        certificateInstanceId:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          nullable: true
        targetId:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          nullable: true
        eventType:
          type: string
          enum:
            - certificate.observed
            - deployment.checked
            - deployment.updated
            - validation.passed
            - validation.failed
            - policy.checked
        source:
          type: string
          enum: [executor, domain-monitor, endpoint-monitor, control-plane, external]
