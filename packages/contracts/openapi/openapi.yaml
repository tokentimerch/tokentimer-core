          description: The supplied RFC3339 timestamp must use a year from 2000 through 2100. Runtime normalizes accepted values to UTC milliseconds; offsets may move the normalized instant outside that lexical-year range.
          nullable: true
        fingerprintSha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
          nullable: true
        summary:
          type: string
          maxLength: 1024
          nullable: true
        metadata:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/CertOpsMetadataEntry"
        artifactRefs:
          type: array
          maxItems: 16
          items:
            type: object
