          type: string
          enum: [accepted, redacted, rejected, failed]
          nullable: true
        observedAt:
          type: string
          format: date-time
          pattern: "^(?:200[0-9]|20[1-9][0-9]|2100)-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](?:\\.[0-9]+)?(?:Z|[+-](?:(?:0[0-9]|1[0-3]):[0-5][0-9]|14:00))$"
          description: The supplied RFC3339 timestamp must use a year from 2000 through 2100. Runtime normalizes accepted values to UTC milliseconds; offsets may move the normalized instant outside that lexical-year range.
        fingerprintSha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
          nullable: true
        summary:
          type: string
          maxLength: 1024
          nullable: true
        metadata:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/CertOpsMetadataEntry"
        artifactRefs:
          type: array
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            required: [type, reference]
            properties:
              type:
                type: string
                enum: [log, report, certificate, deployment, external]
              reference:
                type: string
                minLength: 1
                maxLength: 512
              sha256:
                type: string
                pattern: "^[a-f0-9]{64}$"
                nullable: true
        output:
          type: string
          maxLength: 65536
          x-maxBytes: 65536
          nullable: true
          description: Optional executor output, limited to 65,536 UTF-8 bytes. Runtime rejects private key material, redacts generic secrets to [REDACTED], stores only redacted output separately from normalized metadata, and does not return this field from evidence list responses.
        redactionApplied:
          type: boolean
          nullable: true
