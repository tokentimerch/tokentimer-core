components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionId
      description: Session cookie authentication used by authenticated API routes.
  parameters:
    workspaceIdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    tokenIdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
    userIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: integer
    tokenParam:
      in: path
      name: token
      required: true
      schema:
        type: string
    limitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
    offsetParam:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties: true
            - type: string
      example:
        error: Invalid request payload
        code: VALIDATION_ERROR
        details:
          - email is required
    SessionUser:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        displayName:
          type: string
        plan:
          type: string
        authMethod:
          type: string
        loginMethod:
          type: string
        emailVerified:
          type: boolean
        needsVerification:
          type: boolean
        twoFactorEnabled:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@localhost.local
        password:
          type: string
          example: AdminPassword123!
    LoginSuccessResponse:
      type: object
      required: [message, user]
      properties:
        message:
          type: string
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            displayName:
              type: string
    LoginNeeds2FAResponse:
      type: object
      required: [requires2FA]
      properties:
        requires2FA:
          type: boolean
        authMethod:
          type: string
    Workspace:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        plan:
          type: string
        role:
          type: string
          enum: [admin, workspace_manager, viewer]
        created_by:
          type: integer
        is_personal:
          type: boolean
        is_personal_default:
          type: boolean
    WorkspaceCreateResponse:
      type: object
      required: [id, name, plan, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        plan:
          type: string
        role:
          type: string
      example:
        id: "8d13ecfe-9436-4f09-b8ba-0248c5b4e8ef"
        name: "Production Workspace"
        plan: "oss"
        role: "admin"
    WorkspaceMember:
      type: object
      properties:
        user_id:
          type: integer
        role:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
    TokenCreateRequest:
      type: object
      required: [workspace_id, name, type]
      properties:
        workspace_id:
          type: string
          format: uuid
          example: "8d13ecfe-9436-4f09-b8ba-0248c5b4e8ef"
        name:
          type: string
          example: "Stripe Production API Key"
        type:
          type: string
          example: "api_key"
        category:
          type: string
          example: "payment"
        expiresAt:
          type: string
          format: date
          example: "2027-12-31"
        confirm_duplicate:
          type: boolean
          example: false
        contact_group_id:
          type: string
          example: "d7c5f1be-15f4-4b5b-9b49-f80f0d48d085"
        description:
          type: string
          example: "Rotated quarterly by platform team"
        notes:
          type: string
          example: "Owner: Platform - escalate before expiration"
    Token:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: integer
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        category:
          type: string
        expiration:
          type: string
          format: date
        expiresAt:
          type: string
          format: date
        location:
          type: string
        issuer:
          type: string
        serial_number:
          type: string
        subject:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        id: 142
        workspace_id: "8d13ecfe-9436-4f09-b8ba-0248c5b4e8ef"
        name: "Stripe Production API Key"
        type: "api_key"
        category: "payment"
        expiresAt: "2027-12-31"
        created_at: "2026-03-13T18:00:00.000Z"
        updated_at: "2026-03-13T18:00:00.000Z"
    AuditEvent:
      type: object
      properties:
        id:
          type: integer
        occurred_at:
          type: string
          format: date-time
        actor_user_id:
          type: integer
        actor_display_name:
          type: string
        subject_user_id:
          type: integer
        action:
          type: string
        target_type:
          type: string
        target_id:
          oneOf:
            - type: integer
            - type: string
        channel:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        workspace_id:
          type: string
          format: uuid
          nullable: true
        workspace_name:
          type: string
    ProviderScanRequest:
      type: object
      additionalProperties: true
      properties:
        provider:
          type: string
        credentials:
          type: object
          additionalProperties: true
    VaultScanRequest:
      type: object
      required: [address, token]
      properties:
        address:
          type: string
          format: uri
        token:
          type: string
        include:
          type: object
          additionalProperties: true
        mounts:
          type: array
          items:
            type: string
    VaultMountsRequest:
      type: object
      required: [address, token]
      properties:
        address:
          type: string
          format: uri
        token:
          type: string
    IntegrationScanResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        quota:
          type: object
          additionalProperties: true
    IntegrationImportRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
        workspace_id:
          type: string
          format: uuid
        default_category:
          type: string
        default_type:
          type: string
    IntegrationImportResponse:
      type: object
      properties:
        created:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
