            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Private key material is not accepted in CertOps requests
                code: PRIVATE_KEY_MATERIAL_REJECTED
        "503":
          description: The security audit sink was unavailable while recording a private-key-material rejection. The endpoint fails closed; the payload is neither persisted nor echoed and no executor-event side effects occur.
