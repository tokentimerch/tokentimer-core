openapi: 3.0.3
info:
  title: TokenTimer Core API Contract
  version: 0.3.1
  description: |
    TokenTimer Core API for authentication, workspaces, token lifecycle management,
    alerts, audit, and integration import/scan workflows.
    This contract is also used as a compatibility baseline across core, cloud, and enterprise variants.
servers:
  - url: http://localhost:4000
    description: Local development backend
tags:
  - name: Health
    description: Service health and readiness endpoints.
  - name: Auth
    description: Authentication and account verification flows.
  - name: Session
    description: Session and CSRF token endpoints.
  - name: Workspaces
    description: Workspace CRUD, membership, domains, and workspace-level settings.
  - name: Tokens
    description: Token CRUD, lifecycle actions, and duplicate/bulk handling.
  - name: Account
    description: User account profile, security, plan, and usage endpoints.
  - name: Audit
    description: Audit trail queries and activity reporting.
  - name: Alerts
    description: Alert rules, destinations, queue visibility, and preferences.
  - name: Integrations
    description: Integration scans, discovery, and import operations.
security:
  - cookieAuth: []
paths:
  /health:
    get:
      tags: [Health]
      summary: Health endpoint
      responses:
        "200":
          description: Service health payload
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                    format: double
                  memory:
                    type: object
                    additionalProperties: true
                  environment:
                    type: string
  /api/auth/features:
    get:
      tags: [Auth]
      summary: Auth feature availability flags
      responses:
        "200":
          description: Feature flags for auth providers
          content:
            application/json:
              schema:
                type: object
                required:
                  - saml
                  - oidc
                properties:
                  saml:
                    type: boolean
                  oidc:
                    type: boolean
  /api/session:
    get:
      tags: [Session]
      summary: Get current authenticated session
      operationId: getSession
      description: Returns session state and user profile when the request is authenticated.
      security: []
      responses:
        "200":
          description: Session state payload
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [loggedIn]
                    properties:
                      loggedIn:
                        type: boolean
                        enum: [false]
                  - type: object
                    required: [loggedIn, user]
                    properties:
                      loggedIn:
                        type: boolean
                        enum: [true]
                      user:
                        $ref: "#/components/schemas/SessionUser"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/csrf-token:
    get:
      tags: [Session]
      summary: Issue CSRF token
      operationId: getCsrfToken
      description: Issues a CSRF token that must be sent on state-changing requests.
      security: []
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                required: [csrfToken]
                properties:
                  csrfToken:
                    type: string
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: loginWithPassword
      description: Authenticates a user and returns either a session payload or a 2FA challenge.
      security: []
      requestBody:
        description: Credentials used for password authentication.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success or 2FA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccessResponse"
                  - $ref: "#/components/schemas/LoginNeeds2FAResponse"
        "401":
          description: Invalid credentials or unverified account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/verify-2fa:
    post:
      tags: [Auth]
      summary: Verify 2FA token and finalize login
      operationId: verifyTwoFactorLogin
      description: Completes login for a user that has two-factor authentication enabled.
      security: []
      requestBody:
        description: One-time code generated by the configured authenticator app.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: 2FA verification success
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify account email token
      operationId: verifyEmailToken
      description: Validates an email verification token and redirects to the frontend.
      security: []
      parameters:
        - $ref: "#/components/parameters/tokenParam"
      responses:
        "302":
          description: Redirects to frontend login page with verification outcome
  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      operationId: resendVerificationEmail
      description: Sends a new account verification email for the authenticated or provided user.
      security: []
      requestBody:
        description: Optional target email. If omitted, the current session user is used.
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Resend result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  emailSent:
                    type: boolean
                  error:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/request-password-reset:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: requestPasswordReset
      description: Starts the password reset flow by sending a reset link to the user email.
      security: []
      requestBody:
        description: Email address for the account that should receive the reset link.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset request accepted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      operationId: resetPasswordWithToken
      description: Applies a new password using a previously issued password reset token.
      security: []
      requestBody:
        description: Reset token and replacement password.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      operationId: logoutCurrentSession
      description: Invalidates the current session cookie.
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Compatibility logout endpoint
      operationId: logoutCompatibility
      description: Legacy alias retained for client compatibility. Prefer `/api/logout` for new integrations.
      security: []
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/account/2fa/setup:
    post:
      tags: [Account]
      summary: Begin 2FA setup
      responses:
        "200":
          description: 2FA seed generated
          content:
            application/json:
              schema:
                type: object
                required: [secret, otpauth]
                properties:
                  secret:
                    type: string
                  otpauth:
                    type: string
                  qr:
                    type: string
        "500":
          $ref: "#/components/responses/InternalError"
  /api/account/2fa/enable:
    post:
      tags: [Account]
      summary: Enable 2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/account/2fa/disable:
    post:
      tags: [Account]
      summary: Disable 2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword]
              properties:
                currentPassword:
                  type: string
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/account/change-password:
    post:
      tags: [Account]
      summary: Change account password
      operationId: changeAccountPassword
      description: Changes the password for the currently authenticated account.
      requestBody:
        description: Current password and new password (minimum 12 characters).
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces for current user
      operationId: listWorkspaces
      description: Returns workspaces visible to the authenticated user with pagination metadata.
      parameters:
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workspace"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      description: Creates a new workspace and assigns the creator as an administrator.
      requestBody:
        description: Workspace display name.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}:
    get:
      tags: [Workspaces]
      summary: Get workspace by id
      operationId: getWorkspaceById
      description: Returns details for a single workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      summary: Update workspace
      operationId: updateWorkspace
      description: Updates mutable workspace fields.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
      requestBody:
        description: Workspace fields to update.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Workspaces]
      summary: Delete workspace
      operationId: deleteWorkspace
      description: Deletes a workspace if the caller has sufficient permissions.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
      responses:
        "204":
          description: Workspace deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}/members:
    get:
      tags: [Workspaces]
      summary: List workspace members
      operationId: listWorkspaceMembers
      description: Lists members and invitation-backed members for the workspace.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMember"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      tags: [Workspaces]
      summary: Add or invite workspace member
      operationId: addWorkspaceMember
      description: Adds an existing user or creates/updates an invitation for the provided email.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
      requestBody:
        description: Target member email and role assignment.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [viewer, workspace_manager]
      responses:
        "201":
          description: Member created or invitation updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    nullable: true
                  role:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}/members/{userId}:
    patch:
      tags: [Workspaces]
      summary: Update member role
      operationId: updateWorkspaceMemberRole
      description: Changes the role of an existing workspace member.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
        - $ref: "#/components/parameters/userIdParam"
      requestBody:
        description: New role for the specified member.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, workspace_manager]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                  role:
                    type: string
    delete:
      tags: [Workspaces]
      summary: Remove workspace member
      operationId: removeWorkspaceMember
      description: Removes a user from the workspace membership list.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
        - $ref: "#/components/parameters/userIdParam"
      responses:
        "204":
          description: Member removed
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}/invitations:
    get:
      tags: [Workspaces]
      summary: List pending workspace invitations
      operationId: listWorkspaceInvitations
      description: >
        Returns unaccepted invitations for the workspace. The invitation
        `token` is a bearer secret and is never returned by this endpoint.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Pending invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        email:
                          type: string
                          format: email
                        role:
                          type: string
                        invited_by:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
                        accepted_at:
                          type: string
                          format: date-time
                          nullable: true
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}/invitations/{invitationId}:
    delete:
      tags: [Workspaces]
      summary: Cancel a pending workspace invitation
      operationId: cancelWorkspaceInvitation
      description: >
        Deletes a pending invitation (accepted_at IS NULL) and emits an
        INVITATION_CANCELLED audit event. Does not touch invitations that have
        already been accepted.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
        - in: path
          name: invitationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Invitation cancelled
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workspaces/{id}/transfer-tokens:
    post:
      tags: [Workspaces]
      summary: Transfer token ownership between workspaces
      operationId: transferWorkspaceTokens
      description: Moves tokens from one workspace to another workspace within the same account scope.
      parameters:
        - $ref: "#/components/parameters/workspaceIdParam"
      requestBody:
        description: Source workspace and token ids to move into the target workspace.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_workspace_id, token_ids]
              properties:
                from_workspace_id:
                  type: string
                  format: uuid
                token_ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                type: object
                properties:
                  moved:
                    type: integer
                  targetWorkspaceId:
                    type: string
                    format: uuid
                  fromWorkspaceId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          description: Transfer exceeds plan limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/tokens:
    get:
      tags: [Tokens]
      summary: List tokens
      operationId: listTokens
      description: Lists tokens with optional workspace and text filtering.
      parameters:
        - in: query
          name: workspace_id
          schema:
            type: string
            format: uuid
        - in: query
          name: q
          schema:
            type: string
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Token"
                  total:
                    type: integer
                  facets:
                    type: object
                    additionalProperties: true
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Tokens]
      summary: Create token
      operationId: createToken
      description: Creates a token record. Can also resolve duplicate flows when confirmation flags are used.
      requestBody:
        description: Token payload including workspace id, token name, type, and optional metadata.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenCreateRequest"
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "200":
          description: Duplicate confirm path updated existing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          description: Plan token limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate token candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/tokens/{id}:
    get:
      tags: [Tokens]
      summary: Get token by id
      operationId: getTokenById
      description: Fetches a single token by identifier.
      parameters:
        - $ref: "#/components/parameters/tokenIdParam"
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Tokens]
      summary: Update token by id
      operationId: updateTokenById
      description: Updates mutable fields of an existing token.
      parameters:
        - $ref: "#/components/parameters/tokenIdParam"
      requestBody:
        description: Partial token fields to update.
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Tokens]
      summary: Delete token by id
      operationId: deleteTokenById
      description: Deletes a token record.
      parameters:
        - $ref: "#/components/parameters/tokenIdParam"
      responses:
        "200":
          description: Token deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/tokens/bulk:
    delete:
      tags: [Tokens]
      summary: Bulk delete tokens
      operationId: bulkDeleteTokens
      description: Deletes multiple tokens in one request and returns per-item processing details.
      requestBody:
        description: List of token ids to delete.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
