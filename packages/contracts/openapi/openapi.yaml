          application/json:
            schema:
              $ref: "#/components/schemas/CertOpsPerJobExecutorEventRequest"
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertOpsExecutorEventAcceptedResponse"
