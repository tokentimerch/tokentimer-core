                code: CERTOPS_EXECUTOR_EVENT_CONFLICT
        "413":
          description: The machine request body exceeded the dedicated 4 MiB pre-auth boundary (`CERTOPS_EXECUTOR_EVENT_BODY_TOO_LARGE`), or normalized evidence output exceeded 65,536 UTF-8 bytes (`CERTOPS_EVIDENCE_OUTPUT_TOO_LARGE`). The payload is not echoed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
