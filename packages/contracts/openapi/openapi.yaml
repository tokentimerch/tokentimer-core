    CertOpsExecutorEventRequest:
      type: object
      additionalProperties: false
      description: M2 external executor event envelope reconciled with TOKENTIMER_CERTOPS_PLAN v1.7. eventId is an idempotency key within workspaceId and jobId. Private key material is rejected; generic secrets in log and evidence metadata are redacted before persistence. Older operational lifecycle names are represented as normalized job/evidence events; richer agent-executed protocol and job signing are deferred to M4.
      required:
        - schemaVersion
        - eventId
        - jobId
        - workspaceId
        - status
        - eventType
        - occurredAt
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        eventId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          description: Executor-supplied idempotency key scoped to workspaceId and jobId.
        jobId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
        workspaceId:
          type: string
          format: uuid
        certificateId:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          nullable: true
        executorId:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9_.:-]+$"
          nullable: true
        status:
          type: string
          enum:
            - accepted
            - claimed
            - running
            - succeeded
            - failed
            - rejected
            - blocked
            - cancelled
        eventType:
          type: string
          enum:
            - job.accepted
            - job.started
            - job.progress
            - job.completed
            - job.failed
            - job.rejected
            - evidence.attached
        occurredAt:
          type: string
          format: date-time
          pattern: "^(?:200[0-9]|20[1-9][0-9]|2100)-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](?:\\.[0-9]+)?(?:Z|[+-](?:(?:0[0-9]|1[0-3]):[0-5][0-9]|14:00))$"
          description: The supplied RFC3339 timestamp must use a year from 2000 through 2100. Runtime normalizes accepted values to UTC milliseconds; offsets may move the normalized instant outside that lexical-year range.
        message:
          type: string
          maxLength: 1024
          nullable: true
        evidence:
          type: array
          maxItems: 16
          items:
            $ref: "#/components/schemas/CertOpsEmbeddedExecutorEvidenceItem"
        metadata:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/CertOpsMetadataEntry"
      oneOf:
        - properties:
            eventType:
              enum: [job.accepted, job.started, job.progress, job.completed, job.failed, job.rejected]
        - required: [evidence]
          properties:
            eventType:
              enum: [evidence.attached]
            evidence:
              minItems: 1
