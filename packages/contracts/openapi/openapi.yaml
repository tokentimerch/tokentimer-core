          description: CertOps machine-token rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: CertOps machine-token rate limit exceeded
                code: CERTOPS_MACHINE_RATE_LIMITED
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/certops/executor/events:
    post:
      tags: [CertOps Agent]
      summary: Report executor events
      operationId: createCertOpsExecutorEvent
      description: >-
        M2 aggregate executor ingestion endpoint for normalized job and public
        evidence events. Lifecycle events require `certops:events:write`;
        evidence-bearing events additionally require `certops:evidence:write`.
        The route is hidden with 404 when `certops.enabled` is disabled.
        `eventId` is idempotent within a workspace and job: exact retries return
        202 without repeating logs, evidence, audit rows, or status side effects,
        while a different sanitized envelope using the same key returns 409. Late
        lifecycle events are recorded in the job log but cannot regress or reopen
        a terminal job. Payloads containing private key material are rejected with
        422. Generic secret material in metadata and bounded evidence output is
        redacted to `[REDACTED]` before persistence. Per-job event/evidence routes
        are narrow machine-token aliases that reuse the same hardened ingestion behavior.
      security:
        - certOpsTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertOpsExecutorEventRequest"
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertOpsExecutorEventAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Request rejected because it contained private key material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Private key material is not accepted in CertOps requests
                code: PRIVATE_KEY_MATERIAL_REJECTED
        "503":
          description: The security audit sink was unavailable while recording a private-key-material rejection. The endpoint fails closed; the original payload is neither persisted nor echoed and no executor-event side effects occur.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: CertOps security audit is temporarily unavailable
                code: CERTOPS_SECURITY_AUDIT_UNAVAILABLE
        "409":
          description: Executor event idempotency key conflicts with a different sanitized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Executor event idempotency key conflicts with a different payload
                code: CERTOPS_EXECUTOR_EVENT_CONFLICT
        "413":
          description: The executor event body exceeded the dedicated 4 MiB pre-auth boundary (`CERTOPS_EXECUTOR_EVENT_BODY_TOO_LARGE`), or normalized evidence output exceeded 65,536 UTF-8 bytes (`CERTOPS_EVIDENCE_OUTPUT_TOO_LARGE`). The payload is not echoed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: CertOps evidence output is too large
                code: CERTOPS_EVIDENCE_OUTPUT_TOO_LARGE
        "429":
          description: The exact-path executor pre-auth or authenticated machine-token limiter rejected the request. The response never includes bearer-token material or request content.
          headers:
            Retry-After:
              description: Seconds until the caller may retry.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    required: [retryAfterSeconds]
                    properties:
                      retryAfterSeconds:
                        type: integer
                        minimum: 1
              example:
                error: CertOps machine-token rate limit exceeded
                code: CERTOPS_MACHINE_RATE_LIMITED
                retryAfterSeconds: 60
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/certops/agent/register:
    post:
      tags: [CertOps Agent]
      summary: Register an agent
      operationId: createCertOpsAgentRegistration
      description: Outbound-only agent enrollment using a single-use bootstrap token; returns a per-agent credential shown once. Frozen namespace skeleton; body schema lands in M4.
      security:
        - agentBootstrapTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/certops/agent/heartbeat:
    post:
      tags: [CertOps Agent]
      summary: Agent heartbeat
      operationId: createCertOpsAgentHeartbeat
      description: Agent heartbeat including reported clock offset (clock-drift detection). Per-agent credential authenticated. Frozen skeleton; body schema lands in M4.
      security:
        - agentCredentialAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/certops/agent/jobs/claim:
    post:
      tags: [CertOps Agent]
      summary: Claim pending jobs
      operationId: createCertOpsAgentJobClaim
      description: Agent polls for and claims signed jobs. Per-agent credential authenticated. Frozen skeleton; returns signed job payloads (job-payload.schema.json) in M4.
      security:
        - agentCredentialAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Claimed jobs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/certops/agent/jobs/results:
    post:
      tags: [CertOps Agent]
      summary: Report job results and evidence
      operationId: createCertOpsAgentJobResult
      description: Agent reports job results and evidence metadata. Per-agent credential authenticated. Payloads containing private key material are rejected (422). Frozen skeleton; body schema lands in M4.
      security:
        - agentCredentialAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Result accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Request rejected because it contained private key material
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionId
      description: Session cookie authentication used by authenticated API routes.
    certOpsTokenAuth:
      type: http
      scheme: bearer
      description: Scoped CertOps API token (bearer) used by M2 machine routes. Allowed M2 scopes are certops:read, certops:events:write, certops:jobs:read, and certops:evidence:write. certops:read implies certops:jobs:read only, never a write scope. Bearer-only and non-cookie; CSRF-exempt only for the exact planned POST machine routes. Empty required-scope configuration is invalid.
    agentBootstrapTokenAuth:
      type: http
      scheme: bearer
      description: Single-use, hashed, expiring bootstrap enrollment token used only by POST /api/v1/certops/agent/register. Exchanged for a per-agent credential at registration.
    agentCredentialAuth:
      type: http
      scheme: bearer
      description: Per-agent credential (bearer) issued at registration, used for agent heartbeat, job claim, and result/evidence calls. CSRF-exempt. Not valid for registration.
  parameters:
    workspaceIdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    tokenIdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
    userIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: integer
    tokenParam:
      in: path
      name: token
      required: true
      schema:
        type: string
    limitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
    offsetParam:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
    certOpsReadLimitParam:
      in: query
      name: limit
      description: >-
        Number of items returned. Defaults to 50 when omitted or nonnumeric,
        is limited to 100, and values below 1 are normalized to 1.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    certOpsReadOffsetParam:
      in: query
      name: offset
      description: >-
        Number of items skipped before the page begins. Defaults to 0 when
        omitted or nonnumeric; negative values are normalized to 0.
      schema:
        type: integer
        minimum: 0
        default: 0
    auditSinceParam:
      in: query
      name: since
      description: >-
        Lower bound for occurred_at filtering. Accepts ISO 8601 UTC (recommended),
        YYYY-MM-DD (start of day), or a datetime without timezone
        (YYYY-MM-DDTHH:mm, optional seconds).
      schema:
        type: string
        example: "2026-06-04"
    auditUntilParam:
      in: query
      name: until
      description: >-
        Upper bound for occurred_at filtering. Accepts ISO 8601 UTC (recommended),
        YYYY-MM-DD (end of day), or a datetime without timezone
        (YYYY-MM-DDTHH:mm, optional seconds).
      schema:
        type: string
        example: "2026-06-04"
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties: true
            - type: string
      example:
        error: Invalid request payload
        code: VALIDATION_ERROR
        details:
          - email is required
    CertOpsManagedCertificate:
      type: object
      additionalProperties: false
      description: Public-only CertOps managed certificate inventory record. This schema intentionally excludes private-key custody fields; private key material is rejected at the API boundary.
      required:
        - schemaVersion
        - id
        - workspaceId
        - tokenId
        - profileId
        - status
        - source
        - sourceRef
        - commonName
        - subjectAltNames
        - issuer
        - serialNumber
        - fingerprintSha256
        - spkiFingerprintSha256
        - certificatePem
        - publicKeyAlgorithm
        - publicKeySize
        - signatureAlgorithm
        - notBefore
        - notAfter
        - keyMode
        - keyReference
        - createdAt
        - updatedAt
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        tokenId:
          type: integer
          nullable: true
        profileId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum:
            - discovered
            - active
            - renewing
            - expiring
            - expired
            - revoked
            - decommissioned
        source:
          type: string
          nullable: true
          enum:
            - manual
            - api
            - import
            - domain_checker
            - endpoint_monitor
            - integration
            - auto_sync
            - null
        sourceRef:
          type: string
          nullable: true
          description: Opaque non-secret source reference.
        commonName:
          type: string
          nullable: true
        subjectAltNames:
          type: array
          items:
            type: string
        issuer:
          type: string
          nullable: true
        serialNumber:
          type: string
          nullable: true
        fingerprintSha256:
          type: string
          nullable: true
          pattern: "^[a-f0-9]{64}$"
          description: Lowercase SHA-256 fingerprint of public certificate material.
        spkiFingerprintSha256:
          type: string
          nullable: true
          pattern: "^[a-f0-9]{64}$"
          description: Lowercase SHA-256 fingerprint of the public SubjectPublicKeyInfo.
        certificatePem:
          type: string
          nullable: true
          description: Public certificate PEM only. Private-key PEM, PFX/PKCS#12, and key-bearing material are rejected.
        publicKeyAlgorithm:
          type: string
          nullable: true
        publicKeySize:
          type: integer
          minimum: 1
          nullable: true
        signatureAlgorithm:
          type: string
          nullable: true
        notBefore:
          type: string
          format: date-time
          nullable: true
        notAfter:
          type: string
          format: date-time
          nullable: true
        keyMode:
          type: string
          nullable: true
          enum:
            - agent-local
            - proxy-agent-local
            - cert-manager-managed
            - appliance-managed
            - hsm-managed
            - vault-managed
            - os-store-managed
            - external-unknown
            - null
          description: Non-secret mode describing where the private key lives outside the control plane.
        keyReference:
          type: string
          nullable: true
          maxLength: 256
          description: Opaque non-secret external reference. Inline secrets, private-key material, PEM markers, and control characters are rejected.
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    CertOpsManagedCertificateListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CertOpsManagedCertificate"
        pagination:
          type: object
          additionalProperties: false
          required: [limit, offset]
          properties:
            limit:
              type: integer
              minimum: 1
            offset:
              type: integer
              minimum: 0
    CertOpsManagedCertificateDetailResponse:
      type: object
      additionalProperties: false
      required: [certificate]
      properties:
        certificate:
          $ref: "#/components/schemas/CertOpsManagedCertificate"
    CertOpsCertificateRetireRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum:
            - revoked
            - decommissioned
          description: Soft-retire lifecycle status to apply to the managed certificate and linked token.
        reason:
          type: string
          nullable: true
          maxLength: 512
          description: Optional non-secret retirement reason. Private-key material, PEM markers, and secret-looking assignments are rejected.
    CertOpsCertificateWriteResponse:
      type: object
      additionalProperties: false
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CertOpsManagedCertificate"
        count:
          type: integer
          minimum: 0
    CertOpsCertificateWriteRequest:
      type: object
      additionalProperties: true
      description: Recognized fields for public certificate import/register operations. Unknown fields are ignored by the current runtime, but the entire request body is scanned and rejected if any field contains private key material.
      anyOf:
        - required: [certificatePem]
        - required: [pem]
        - required: [certificate]
        - required: [chainPem]
        - required: [certificates]
      properties:
        certificatePem:
          type: string
          description: Public certificate PEM or PEM chain. Private key material is rejected with PRIVATE_KEY_MATERIAL_REJECTED.
        pem:
          type: string
          description: Public certificate PEM or PEM chain.
        certificate:
          type: string
          description: Public certificate PEM or PEM chain.
        chainPem:
          type: string
          description: Public certificate PEM chain.
        certificates:
          type: array
          minItems: 1
          items:
            type: string
          description: Public certificate PEM blocks joined by the runtime into a chain.
        sourceRef:
          type: string
          nullable: true
          description: Opaque non-secret source reference.
        name:
          type: string
          nullable: true
        keyMode:
          type: string
          nullable: true
          enum:
            - agent-local
            - proxy-agent-local
            - cert-manager-managed
            - appliance-managed
            - hsm-managed
            - vault-managed
            - os-store-managed
            - external-unknown
            - null
          description: Non-secret mode describing where the private key lives outside the control plane.
        keyReference:
          type: string
          nullable: true
          maxLength: 256
          description: Opaque non-secret external reference. Invalid references return CERTOPS_KEY_REFERENCE_INVALID; private-key material returns PRIVATE_KEY_MATERIAL_REJECTED.
    CertOpsMetadataEntry:
      type: object
      additionalProperties: false
      description: Public metadata only. Names colliding after case/separator normalization with server-owned executor, evidence, lifecycle, or redaction fields are rejected.
      x-certops-reservedMetadataNames: [executorEventId, executorEventType, executorStatus, occurredAt, certificateId, executorId, evidenceId, certificateInstanceId, targetId, source, status, fingerprintSha256, summary, artifactRefs, redactionApplied, redactionCount, redactedFields, redactedSecretCategories, jobStatusTransitionApplied, jobStatusTransitionIgnored, jobStatusTransitionIgnoredReason]
      required: [name, value]
      properties:
        name:
          type: string
          maxLength: 64
          description: Public metadata name. Private-key-bearing names are prohibited. Generic-secret-bearing names are accepted only for server-side redaction and persist under server-owned redacted metadata keys. Names colliding with x-certops-reservedMetadataNames are rejected.
          pattern: "^(?!.*(?:[Pp][Rr][Ii][Vv][Aa][Tt][Ee][-_]?[Kk][Ee][Yy]|[Ee][Nn][Cc][Rr][Yy][Pp][Tt][Ee][Dd][-_]?[Pp][Rr][Ii][Vv][Aa][Tt][Ee][-_]?[Kk][Ee][Yy]|[Kk][Ee][Yy][-_]?[Mm][Aa][Tt][Ee][Rr][Ii][Aa][Ll]|[Pp][Ff][Xx][-_]?[Bb][Ll][Oo][Bb]|[Jj][Kk][Ss][-_]?[Bb][Ll][Oo][Bb]|[Tt][Ll][Ss][-_]?[Kk][Ee][Yy]|[Cc][Aa][-_]?[Pp][Rr][Ii][Vv][Aa][Tt][Ee][-_]?[Kk][Ee][Yy]|[Kk][Ee][Yy][Ss][Tt][Oo][Rr][Ee][-_]?[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd]|[Pp][Rr][Ii][Vv][Aa][Tt][Ee][-_]?[Kk][Ee][Yy][-_]?[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd]|[Kk][Ee][Yy][-_]?[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd]|[Kk][Ee][Yy][-_]?[Pp][Ee][Mm]))[A-Za-z0-9_.:-]{1,64}$"
        value:
          oneOf:
            - type: string
              maxLength: 512
            - type: number
            - type: integer
            - type: boolean
    CertOpsJob:
      type: object
      additionalProperties: false
      description: Public CertOps job summary for dashboard and timeline reads. Payload and result metadata are omitted from list responses.
      required:
        - id
        - workspaceId
        - operation
        - status
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        operation:
          type: string
          enum: [renew, deploy, reload, revoke, noop]
        status:
          type: string
          enum:
            - pending_approval
            - approved
            - rejected
            - pending
            - claimed
            - running
            - succeeded
            - failed
            - blocked
            - cancelled
        source:
          type: string
          enum: [api, executor, system, automation, domain-monitor, endpoint-monitor, control-plane, external]
        subjectType:
          type: string
          nullable: true
          enum: [managed_certificate, certificate_instance, certificate_target, token, domain, endpoint, external]
        subjectId:
          type: string
          maxLength: 128
          nullable: true
        requestedByUserId:
          type: integer
          nullable: true
        requestedByApiTokenId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        queuedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
    CertOpsJobListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CertOpsJob"
        pagination:
          $ref: "#/components/schemas/Pagination"
    CertOpsPublicObject:
      type: object
      additionalProperties: true
      description: Sanitized public metadata object. Runtime rejects private-key material, credentials, token secrets, raw secret dumps, and custody-shaped field names before persistence.
    CertOpsJobDetail:
      type: object
      additionalProperties: false
      required: [id, workspaceId, operation, status, source, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        operation:
          type: string
          enum: [renew, deploy, reload, revoke, noop]
        status:
          type: string
          enum: [pending_approval, approved, rejected, pending, claimed, running, succeeded, failed, blocked, cancelled]
        source:
          type: string
          enum: [api, executor, system, automation, domain-monitor, endpoint-monitor, control-plane, external]
        subjectType:
          type: string
          nullable: true
          enum: [managed_certificate, certificate_instance, certificate_target, token, domain, endpoint, external]
        subjectId:
          type: string
          maxLength: 128
          nullable: true
        requestedByUserId:
          type: integer
          nullable: true
        requestedByApiTokenId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        queuedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        payload:
          $ref: "#/components/schemas/CertOpsPublicObject"
        resultMetadata:
          $ref: "#/components/schemas/CertOpsPublicObject"
        errorCode:
          type: string
          maxLength: 128
          nullable: true
        errorMessage:
          type: string
          maxLength: 1024
          nullable: true
    CertOpsJobDetailResponse:
      type: object
      additionalProperties: false
      required: [job]
      properties:
        job:
          $ref: "#/components/schemas/CertOpsJobDetail"
    CertOpsJobLogEntry:
      type: object
      additionalProperties: false
      required: [id, workspaceId, jobId, eventType, createdAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [job.created, job.accepted, job.started, job.progress, job.completed, job.failed, job.rejected, job.cancelled, job.status_updated, evidence.attached]
        status:
          type: string
          nullable: true
          enum: [pending_approval, approved, rejected, pending, claimed, running, succeeded, failed, blocked, cancelled]
        message:
          type: string
          maxLength: 1024
          nullable: true
        metadata:
          $ref: "#/components/schemas/CertOpsPublicObject"
        createdByUserId:
          type: integer
          nullable: true
        createdByApiTokenId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
    CertOpsJobLogListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
