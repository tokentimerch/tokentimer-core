packages:
  - "apps/*"
  - "packages/*"

overrides:
  tar: 7.5.7
  fast-xml-builder: 1.2.0
  fast-xml-parser: 5.7.3
  minimatch: 9.0.9
  brace-expansion: 2.1.2
  path-to-regexp: 8.4.0
  yaml: 1.10.3
  js-yaml: 4.3.0
  rollup: 4.60.0
  flatted: 3.4.2
  serialize-javascript: 7.0.5
  "picomatch@2": 2.3.2
  "picomatch@4": 4.0.4
  "ajv@6": 6.15.0
  lodash: 4.18.1
  follow-redirects: 1.16.0
  postcss: 8.5.12
  qs: 6.15.2
  ip-address: 10.2.0
  form-data: 4.0.6
  ws: 8.21.0
  # Low-severity DoS when an invalid limit silently disables size enforcement
  # (GHSA-v422-hmwv-36x6). express@5.2.1 allows ^2.2.1; pin the patched release.
  body-parser: 2.3.0
  # AJV pulls fast-uri; pin past GHSA-q3j6-qgpj-74h6 / GHSA-v39h-62p7-jpjc /
  # GHSA-4c8g-83qw-93j6 / GHSA-v2hh-gcrm-f6hx (path traversal + host confusion).
  fast-uri: 3.1.4

allowBuilds:
  esbuild: true
  sharp: true
  "@scarf/scarf": true
