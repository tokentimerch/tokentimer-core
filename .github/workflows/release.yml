name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HELM_OCI_REGISTRY: ghcr.io
  HELM_OCI_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  # Stage 1a: build and push immutable versioned image tags only (never :latest).
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: api
            dockerfile: deploy/compose/Dockerfile.api
          - component: worker
            dockerfile: deploy/compose/Dockerfile.worker
          - component: dashboard
            dockerfile: deploy/compose/Dockerfile.dashboard
          - component: k8s-controller
            dockerfile: apps/k8s-controller/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tokentimer-core-${{ matrix.component }}:${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 1b: package Helm chart (no OCI publish yet).
  build-helm-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Helm
        run: |
          curl -fsSLo /tmp/helm.tar.gz https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz
          echo "0165ee4a2db012cc657381001e593e981f42aa5707acdd50658326790c9d0dc3  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Update Chart version from tag
        run: |
          cd deploy/helm
          VER='${{ steps.get_version.outputs.VERSION }}'
          sed -i "s/^version:.*/version: \"$VER\"/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VER\"/" Chart.yaml
          sed -i "/repository: tokentimer-core-api\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml
          sed -i "/repository: tokentimer-core-dashboard\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml
          sed -i "/repository: tokentimer-core-worker\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml
          sed -i "/repository: tokentimer-core-k8s-controller\$/,/pullPolicy:/{s/^      tag: .*/      tag: \"$VER\"/}" values.yaml

      - name: Package chart
        run: helm package deploy/helm --destination .helm-pkg

      - name: Lint and template packaged chart
        run: |
          CHART=".helm-pkg/tokentimer-${{ steps.get_version.outputs.VERSION }}.tgz"
          test -f "$CHART"
          helm lint "$CHART"
          helm template tokentimer "$CHART" >/dev/null

      - name: Upload Helm package artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: helm-chart
          path: .helm-pkg/tokentimer-${{ steps.get_version.outputs.VERSION }}.tgz
          if-no-files-found: error

  # Stage 1c: build agent release tarball + checksum (not attached yet).
  pack-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pack agent release tarball
        run: node packages/agent/scripts/pack-release.js --out-dir agent-dist

      - name: Verify agent checksum
        run: |
          cd agent-dist
          ls -la
          sha256sum -c ./*.sha256

      - name: Upload agent release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: agent-release
          path: |
            agent-dist/*.tgz
            agent-dist/*.sha256
          if-no-files-found: error

  # Stage 2: verify all artifacts before any public release / :latest / Helm OCI publish.
  verify-release:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-docker
      - build-helm-chart
      - pack-agent
    permissions:
      packages: read
      contents: read
    steps:
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify versioned image digests
        run: |
          set -euo pipefail
          VER='${{ steps.get_version.outputs.VERSION }}'
          OWNER='${{ github.repository_owner }}'
          for component in api worker dashboard k8s-controller; do
            IMAGE="ghcr.io/${OWNER}/tokentimer-core-${component}:${VER}"
            echo "Inspecting ${IMAGE}"
            docker buildx imagetools inspect "$IMAGE"
          done

      - name: Install Helm
        run: |
          curl -fsSLo /tmp/helm.tar.gz https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz
          echo "0165ee4a2db012cc657381001e593e981f42aa5707acdd50658326790c9d0dc3  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Download Helm package artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: helm-chart
          path: .helm-pkg

      - name: Verify Helm package
        run: |
          set -euo pipefail
          CHART=".helm-pkg/tokentimer-${{ steps.get_version.outputs.VERSION }}.tgz"
          test -f "$CHART"
          helm lint "$CHART"
          helm template tokentimer "$CHART" >/dev/null

      - name: Download agent release artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: agent-release
          path: agent-dist

      - name: Verify agent release artifacts
        run: |
          set -euo pipefail
          cd agent-dist
          test -n "$(ls *.tgz 2>/dev/null)"
          test -n "$(ls *.sha256 2>/dev/null)"
          sha256sum -c ./*.sha256

  # Stage 3a: publish Helm to OCI only after verification (chart refs versioned images).
  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: verify-release
    permissions:
      packages: write
      contents: read
    steps:
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Helm
        run: |
          curl -fsSLo /tmp/helm.tar.gz https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz
          echo "0165ee4a2db012cc657381001e593e981f42aa5707acdd50658326790c9d0dc3  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Download Helm package artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: helm-chart
          path: .helm-pkg

      - name: Log in to OCI registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.HELM_OCI_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart to OCI registry
        run: helm push .helm-pkg/tokentimer-${{ steps.get_version.outputs.VERSION }}.tgz oci://${{ env.HELM_OCI_REPO }}

  # Stage 3b: create the public GitHub Release only after verify + Helm publish succeed.
  create-release:
    runs-on: ubuntu-latest
    needs:
      - verify-release
      - publish-helm-chart
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download agent release artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: agent-release
          path: agent-dist

      - name: Detect existing GitHub Release for tag
        id: release_lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for ${TAG_NAME}; skipping create so UI title and body are kept."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.release_lookup.outputs.exists != 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## TokenTimer Core ${{ steps.get_version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/tokentimerch/tokentimer-core/blob/main/CHANGELOG.md) for details.

            ### Installation

            **Helm (OCI):**
            ```bash
            helm install tokentimer oci://ghcr.io/${{ github.repository_owner }}/charts/tokentimer \
              --version ${{ steps.get_version.outputs.VERSION }} \
              --namespace tokentimer --create-namespace \
              --set config.adminEmail=admin@example.com
            ```

            **Docker Compose:**
            ```bash
            docker compose -f deploy/compose/docker-compose.yml up -d
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
          files: |
            agent-dist/*.tgz
            agent-dist/*.sha256

      - name: Upload release assets to existing release
        if: steps.release_lookup.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG_NAME" agent-dist/*.tgz agent-dist/*.sha256 \
            --repo "${{ github.repository }}" --clobber

  # Stage 4: promote all components to :latest together after the public release exists.
  promote-latest:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      packages: write
      contents: read
    steps:
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote versioned images to :latest
        run: |
          set -euo pipefail
          VER='${{ steps.get_version.outputs.VERSION }}'
          OWNER='${{ github.repository_owner }}'
          for component in api worker dashboard k8s-controller; do
            SRC="ghcr.io/${OWNER}/tokentimer-core-${component}:${VER}"
            DST="ghcr.io/${OWNER}/tokentimer-core-${component}:latest"
            echo "Promoting ${SRC} -> ${DST}"
            docker buildx imagetools create -t "$DST" "$SRC"
          done
