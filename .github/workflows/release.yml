name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HELM_OCI_REGISTRY: ghcr.io
  HELM_OCI_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Detect existing GitHub Release for tag
        id: release_lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for ${TAG_NAME}; skipping create so UI title and body are kept."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.release_lookup.outputs.exists != 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## TokenTimer Core ${{ steps.get_version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/tokentimerch/tokentimer-core/blob/main/CHANGELOG.md) for details.

            ### Installation

            **Helm (OCI):**
            ```bash
            helm install tokentimer oci://ghcr.io/${{ github.repository_owner }}/charts/tokentimer \
              --version ${{ steps.get_version.outputs.VERSION }} \
              --namespace tokentimer --create-namespace \
              --set config.adminEmail=admin@example.com
            ```

            **Docker Compose:**
            ```bash
            docker compose -f deploy/compose/docker-compose.yml up -d
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        component: [api, worker, dashboard]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deploy/compose/Dockerfile.${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tokentimer-core-${{ matrix.component }}:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/tokentimer-core-${{ matrix.component }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | DESIRED_VERSION=v3.20.1 bash
          helm version

      - name: Log in to OCI registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.HELM_OCI_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Update Chart version from tag
        run: |
          cd deploy/helm
          VER='${{ steps.get_version.outputs.VERSION }}'
          sed -i "s/^version:.*/version: \"$VER\"/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VER\"/" Chart.yaml
          sed -i "/repository: tokentimer-core-api\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml
          sed -i "/repository: tokentimer-core-dashboard\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml
          sed -i "/repository: tokentimer-core-worker\$/,/pullPolicy:/{s/^    tag: .*/    tag: \"$VER\"/}" values.yaml

      - name: Package chart
        run: helm package deploy/helm --destination .helm-pkg

      - name: Push chart to OCI registry
        run: helm push .helm-pkg/tokentimer-${{ steps.get_version.outputs.VERSION }}.tgz oci://${{ env.HELM_OCI_REPO }}
